  - name: "rhel01"
    image: "rhel-9.5"
    memory: "16G"
    cores: 4
    image_size: "30Gi"
    tags:
      - key: "AnsibleGroup"
        value: "isolated"
    networks:
      - default
      - secondary
    services:
      - name: app-http
        ports:
          - port: 80
            protocol: TCP
            targetPort: 80
            name: app-http
    routes:
      - name: app
        host: app
        service: app-http
        targetPort: 80
        tls: true
        tls_termination: Edge
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }  
      runcmd:
        - echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd

  - name: "rhel02"
    image: "rhel-9.5"
    memory: "16G"
    cores: 4
    image_size: "30Gi"
    tags:
      - key: "AnsibleGroup"
        value: "isolated"
    networks:
      - default
      - secondary
    services:
      - name: app2-http
        ports:
          - port: 80
            protocol: TCP
            targetPort: 80
            name: app2-http
    routes:
      - name: app2
        host: app2
        service: app2-http
        targetPort: 80
        tls: true
        tls_termination: Edge
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }  
      runcmd:
        - echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd        

  - name: "central"
    image: "rhel-9.5"
    memory: "8G"
    cores: 4
    image_size: "30Gi"
    tags:
      - key: "AnsibleGroup"
        value: "isolated"
    networks:
      - default
      - secondary
    services:
      # ── Errata Repo ──
      - name: errata-repo
        ports:
          - port: 8085
            protocol: TCP
            targetPort: 8085
            name: errata-repo
      # ── Compliance Portal ──
      - name: compliance-portal
        ports:
          - port: 8086
            protocol: TCP
            targetPort: 8086
            name: compliance-portal
      # ── OPA ──
      - name: opa-http
        ports:
          - port: 8181
            protocol: TCP
            targetPort: 8181
            name: opa-http
      # ── Splunk ──
      - name: splunk-http
        ports:
          - port: 8000
            protocol: TCP
            targetPort: 8000
            name: splunk-http
      - name: splunk-hec
        ports:
          - port: 8088
            protocol: TCP
            targetPort: 8088
            name: splunk-hec
      - name: splunk-mgmt
        ports:
          - port: 8089
            protocol: TCP
            targetPort: 8089
            name: splunk-mgmt
      - name: splunk-fwd
        ports:
          - port: 9997
            protocol: TCP
            targetPort: 9997
            name: splunk-fwd
    routes:
      - name: splunk
        host: splunk-http
        service: splunk-http
        targetPort: 8000
        tls: true
        tls_termination: Edge
        tls_insecureEdgeTerminationPolicy: Redirect
      - name: compliance-portal
        host: compliance
        service: compliance-portal
        targetPort: 8086
        tls: true
        tls_termination: Edge
      - name: opa-http
        host: opa-http
        service: opa-http
        targetPort: 8181
        tls: true
        tls_termination: Edge
   
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd
