---
# Control node bootstrap: repo management, packages, collections, clone repo.
# Replaces setup-control.sh
#
# Required variables:
#   ahtoken, tmm_orgid, tmm_activation

- name: Assert required variables are set
  ansible.builtin.assert:
    that:
      - ahtoken is defined and ahtoken | length > 0
      - tmm_orgid is defined and tmm_orgid | length > 0
      - tmm_activation is defined and tmm_activation | length > 0
    fail_msg: "Missing required variables for control bootstrap"

- name: Enable subscription-manager repo management
  block:
    - name: Check current manage_repos setting
      ansible.builtin.command:
        cmd: subscription-manager config --list
      register: _sm_config
      changed_when: false

    - name: Set manage_repos to 1
      ansible.builtin.command:
        cmd: subscription-manager config --rhsm.manage_repos=1
      when: "'manage_repos = 1' not in _sm_config.stdout"

    - name: Refresh subscription data
      ansible.builtin.command:
        cmd: subscription-manager refresh
      when: "'manage_repos = 1' not in _sm_config.stdout"
      changed_when: true

- name: Write Ansible configuration with Automation Hub token
  ansible.builtin.copy:
    content: |
      [defaults]
      [galaxy]
      server_list = automation_hub, validated, galaxy
      [galaxy_server.automation_hub]
      url = https://console.redhat.com/api/automation-hub/content/published/
      auth_url = https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
      token={{ ahtoken }}
      [galaxy_server.validated]
      url = https://console.redhat.com/api/automation-hub/content/validated/
      auth_url = https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
      token={{ ahtoken }}
      [galaxy_server.galaxy]
      url=https://galaxy.ansible.com/
      [ssh_connection]
      ssh_args = -o ControlMaster=auto -o ControlPersist=60s
      pipelining = True
    dest: ~/.ansible.cfg
    mode: "0600"

- name: Install required packages
  ansible.builtin.dnf:
    name:
      - dnf-utils
      - git
    state: present

- name: Clone workshop repo
  ansible.builtin.git:
    repo: "{{ workshop_repo_url }}"
    dest: "{{ workshop_repo_dest }}"
    version: "{{ workshop_repo_branch }}"
    force: true
  environment:
    GIT_TERMINAL_PROMPT: "0"

- name: Create temporary Ansible directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - /tmp/.ansible-cp
    - /tmp/.ansible-fact-cache

- name: Write collection requirements
  ansible.builtin.copy:
    content: |
      ---
      collections:
        - name: ansible.controller
        - name: ansible.posix
        - name: ansible.utils
        - name: containers.podman
        - name: community.general
        - name: redhat.rhel_system_roles
    dest: /tmp/requirements.yml
    mode: "0644"

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy install -r /tmp/requirements.yml
  register: _galaxy_install
  changed_when: "'was installed' in _galaxy_install.stdout"
  retries: 3
  delay: 5
  until: _galaxy_install.rc == 0

- name: Check if ansible.controller collection exists
  ansible.builtin.command:
    cmd: ansible-galaxy collection list
  register: _collection_list
  changed_when: false
  failed_when: false

- name: Symlink awx.awx as ansible.controller if needed
  when: "'ansible.controller' not in _collection_list.stdout"
  block:
    - name: Create ansible namespace directory
      ansible.builtin.file:
        path: ~/.ansible/collections/ansible_collections/ansible
        state: directory
        mode: "0755"

    - name: Create symlink
      ansible.builtin.file:
        src: ~/.ansible/collections/ansible_collections/awx/awx
        dest: ~/.ansible/collections/ansible_collections/ansible/controller
        state: link
        force: true

- name: Clean up temporary Ansible config
  ansible.builtin.file:
    path: ~/.ansible.cfg
    state: absent
