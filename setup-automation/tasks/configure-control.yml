---
# Control node configure: wait for AAP, generate OAuth token, run config playbooks.
# Replaces setup-control-configure.sh

- name: Wait for AAP Controller API to be ready
  ansible.builtin.uri:
    url: "https://control/api/controller/v2/ping/"
    method: GET
    user: admin
    password: "ansible123!"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: _aap_ping
  retries: 60
  delay: 10
  until: _aap_ping.status == 200

- name: Generate AAP OAuth token
  ansible.builtin.uri:
    url: "https://control/api/controller/v2/tokens/"
    method: POST
    user: admin
    password: "ansible123!"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      description: "dcc-setup-automation"
      application: null
      scope: "write"
    status_code: 201
  register: _aap_token

- name: Validate OAuth token was generated
  ansible.builtin.assert:
    that:
      - _aap_token.json.token is defined
      - _aap_token.json.token | length > 0
    fail_msg: "Failed to generate AAP OAuth token"

- name: Set OAuth token fact
  ansible.builtin.set_fact:
    controller_oauth_token: "{{ _aap_token.json.token }}"

- name: Configure app server
  ansible.builtin.command:
    cmd: >-
      ansible-playbook lab/setup/configure-app-server.yml
      -i lab/inventory/workshop.yml
      -e "ansible_ssh_pass={{ hostvars[inventory_hostname].ansible_ssh_pass }}"
    chdir: "{{ workshop_repo_dest }}"
  environment:
    ANSIBLE_HOST_KEY_CHECKING: "False"
  register: _app_server_config
  changed_when: true

- name: Configure AAP Controller
  ansible.builtin.command:
    cmd: >-
      ansible-playbook lab/setup/configure-aap.yml
      -i lab/inventory/workshop.yml
      -e "controller_oauth_token_override={{ controller_oauth_token }}"
      -e "ansible_ssh_pass={{ hostvars[inventory_hostname].ansible_ssh_pass }}"
      -e "workshop_guid={{ guid | default('') }}"
      -e "workshop_domain={{ domain | default('') }}"
    chdir: "{{ workshop_repo_dest }}"
  environment:
    ANSIBLE_HOST_KEY_CHECKING: "False"
  register: _aap_config
  changed_when: true

- name: Configure EDA Controller (credential and project)
  ansible.builtin.command:
    cmd: >-
      ansible-playbook lab/setup/configure-eda.yml
      -i lab/inventory/workshop.yml
      -e "controller_oauth_token_override={{ controller_oauth_token }}"
      -e "ansible_ssh_pass={{ hostvars[inventory_hostname].ansible_ssh_pass }}"
    chdir: "{{ workshop_repo_dest }}"
  environment:
    ANSIBLE_HOST_KEY_CHECKING: "False"
  register: _eda_config
  changed_when: true
  tags:
    - eda
