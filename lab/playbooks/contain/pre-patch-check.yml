---
- name: Pre-patch policy check via OPA
  hosts: appservers
  gather_facts: true

  vars:
    opa_url: "http://{{ opa_host | default('central') }}:{{ opa_port | default(8181) }}"
    target_service: httpd
    backup_marker_path: /var/log/last-backup-timestamp

  tasks:
    - name: Gather system facts for policy evaluation
      block:
        - name: Check backup marker age
          ansible.builtin.stat:
            path: "{{ backup_marker_path }}"
          register: _backup_marker

        - name: Calculate backup age
          ansible.builtin.set_fact:
            backup_age_hours: >-
              {{ ((ansible_date_time.epoch | int - _backup_marker.stat.mtime | int) / 3600) | round(1)
                 if _backup_marker.stat.exists
                 else 999 }}

        - name: Check target service state
          ansible.builtin.systemd:
            name: "{{ target_service }}"
          register: _service_state

        - name: Calculate free disk space
          ansible.builtin.set_fact:
            free_disk_gb: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first | int / 1073741824) | round(1) }}"

    - name: Display input values being sent to OPA
      ansible.builtin.debug:
        msg: |
          Policy input for {{ inventory_hostname }}:
            current_hour: {{ ansible_date_time.hour }}
            backup_marker_exists: {{ _backup_marker.stat.exists }}
            backup_age_hours: {{ backup_age_hours }}
            free_disk_gb: {{ free_disk_gb }}
            service_state: {{ _service_state.status.ActiveState }}

    - name: Query OPA patch policy
      ansible.builtin.uri:
        url: "{{ opa_url }}/v1/data/dcc/patch_policy/result"
        method: POST
        body_format: json
        body:
          input:
            current_hour: "{{ ansible_date_time.hour | int }}"
            backup_age_hours: "{{ backup_age_hours | float }}"
            free_disk_gb: "{{ free_disk_gb | float }}"
            service_state: "{{ _service_state.status.ActiveState }}"
        return_content: true
      register: _opa_response

    - name: Display policy gate results
      ansible.builtin.debug:
        msg: |
          OPA Patch Policy Evaluation for {{ inventory_hostname }}:
          {% for gate_name, gate_result in _opa_response.json.result.gates.items() %}
            {{ 'PASS' if gate_result.pass else 'FAIL' }} | {{ gate_name }}: {{ gate_result.description }}
          {% endfor %}

          Result: {{ 'APPROVED' if _opa_response.json.result.allow_patch else 'BLOCKED' }}
          Gates passed: {{ _opa_response.json.result.passed_gates }}/{{ _opa_response.json.result.total_gates }}

    - name: Fail if policy gates not met
      ansible.builtin.fail:
        msg: >-
          POLICY VIOLATION: {{ _opa_response.json.result.failed_gates | join(', ') }}
          failed. Patching not permitted.
      when: not (_opa_response.json.result.allow_patch | bool)

    - name: Record policy check pass
      ansible.builtin.set_stats:
        data:
          pre_patch_policy_passed: true
          policy_check_timestamp: "{{ ansible_date_time.iso8601 }}"
          policy_gates_passed: "{{ _opa_response.json.result.passed_gates }}"
