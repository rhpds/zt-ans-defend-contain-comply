---
- name: Generate compliance evidence report
  hosts: appservers
  gather_facts: true

  vars:
    report_output_dir: /tmp/compliance-reports
    _target_cve: "{{ target_cve | default('CVE-2024-38476') }}"
    _target_advisory: "{{ target_advisory | default('RHSA-2024:5138') }}"
    organization: Parasol Finance

  tasks:
    - name: Ensure report output directory exists
      ansible.builtin.file:
        path: "{{ report_output_dir }}"
        state: directory
        mode: "0755"

    - name: Gather compliance evidence - installed packages
      ansible.builtin.command:
        cmd: rpm -q httpd
      register: _current_httpd
      changed_when: false

    - name: Gather compliance evidence - applied advisories
      ansible.builtin.command:
        cmd: "yum history info"
      register: _yum_history
      changed_when: false

    - name: Gather compliance evidence - SELinux status
      ansible.builtin.command:
        cmd: sestatus
      register: _sestatus
      changed_when: false

    - name: Gather compliance evidence - firewall rules
      ansible.builtin.command:
        cmd: firewall-cmd --list-all
      register: _firewall_rules
      changed_when: false

    - name: Gather compliance evidence - open ports
      ansible.builtin.command:
        cmd: ss -tlnp
      register: _ports
      changed_when: false

    - name: Generate HTML compliance report
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/compliance-report.html.j2"
        dest: "{{ report_output_dir }}/compliance-report-{{ ansible_date_time.date }}.html"
        mode: "0644"
      vars:
        report_data:
          host: "{{ inventory_hostname }}"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          cve: "{{ _target_cve }}"
          advisory: "{{ _target_advisory }}"
          organization: "{{ organization }}"
          httpd_version: "{{ _current_httpd.stdout }}"
          selinux_status: "{{ _sestatus.stdout }}"
          firewall_config: "{{ _firewall_rules.stdout }}"
          listening_ports: "{{ _ports.stdout }}"
          yum_history: "{{ _yum_history.stdout }}"

    - name: Set report filename fact
      ansible.builtin.set_fact:
        _report_filename: "{{ inventory_hostname }}-patch-compliance-{{ ansible_date_time.date }}.html"
        _report_src: "{{ report_output_dir }}/compliance-report-{{ ansible_date_time.date }}.html"

    - name: Push report to central compliance portal
      ansible.builtin.fetch:
        src: "{{ _report_src }}"
        dest: "/tmp/dcc-fetched-reports/{{ _report_filename }}"
        flat: true
      changed_when: false

    - name: Copy report to central portal directory
      ansible.builtin.copy:
        src: "/tmp/dcc-fetched-reports/{{ _report_filename }}"
        dest: "/opt/compliance-reports/{{ _report_filename }}"
        mode: "0644"
      delegate_to: central
      become: true

    - name: Report location of compliance evidence
      ansible.builtin.debug:
        msg: >-
          Compliance report generated:
          {{ report_output_dir }}/compliance-report-{{ ansible_date_time.date }}.html
          Portal: {{ compliance_portal_url | default('http://central:8086') }}/{{ _report_filename }}

- name: Regenerate compliance portal index
  hosts: central
  gather_facts: true
  become: true

  vars:
    compliance_report_dir: /opt/compliance-reports
    organization: Parasol Finance

  tasks:
    - name: Find all compliance reports
      ansible.builtin.find:
        paths: "{{ compliance_report_dir }}"
        patterns: "*.html"
        excludes: "index.html"
      register: _report_files

    - name: Generate portal index page
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/compliance-portal-index.html.j2"
        dest: "{{ compliance_report_dir }}/index.html"
        mode: "0644"
      vars:
        report_files: "{{ _report_files.files | map(attribute='path') | map('basename') | list }}"
        generated_at: "{{ ansible_date_time.iso8601 }}"
