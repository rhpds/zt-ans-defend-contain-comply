---
# EXERCISE: Write a pre-patch policy check that queries OPA.
#
# This playbook gathers system facts, sends them to OPA for policy
# evaluation, and fails the play if any gates are not met.
#
# Steps:
#   1. Gather facts: backup marker age, service state, free disk space
#   2. POST the facts to OPA at {{ opa_url }}/v1/data/dcc/patch_policy/result
#   3. Display the gate results
#   4. Fail the play if allow_patch is false
#   5. Record the result with set_stats for the workflow
#
# OPA INPUT PAYLOAD (what OPA expects):
#   {
#     "input": {
#       "current_hour":     <int>,    -- from ansible_date_time.hour
#       "backup_age_hours": <float>,  -- hours since /var/log/last-backup-timestamp was modified
#       "free_disk_gb":     <float>,  -- free space on / in GB
#       "service_state":    <string>  -- ActiveState of httpd (e.g. "active")
#     }
#   }
#
# OPA RESPONSE (what you get back):
#   {
#     "result": {
#       "allow_patch": true|false,
#       "gates": { "<gate_name>": { "pass": true|false, "description": "..." }, ... },
#       "passed_gates": <int>,
#       "total_gates":  <int>,
#       "failed_gates": [ "<gate_name>", ... ]
#     }
#   }
#
# HINTS:
#   - Use ansible.builtin.stat to get the backup marker mtime
#   - Calculate age: (epoch_now - mtime) / 3600
#   - ansible_mounts gives you mount info; filter for mount == "/"
#   - Use ansible.builtin.uri to POST to OPA
#   - Use ansible.builtin.fail with when: to block patching
#   - Use ansible.builtin.set_stats to pass data to workflow nodes
#
# SOLUTION: lab/playbooks/contain/pre-patch-check.yml

