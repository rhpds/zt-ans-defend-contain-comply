---
- name: Build hardened application container
  hosts: rhel01
  gather_facts: true

  vars:
    container_name: parasol-app
    container_tag: "{{ ansible_date_time.date }}"
    containerfile_src: "{{ playbook_dir }}/../../templates/Containerfile.j2"
    build_context: /tmp/container-build
    registry_url: "localhost:5000"
    app_port: 8443

  tasks:
    - name: Create build context directory
      ansible.builtin.file:
        path: "{{ build_context }}"
        state: directory
        mode: "0755"

    - name: Generate Containerfile from template
      ansible.builtin.template:
        src: "{{ containerfile_src }}"
        dest: "{{ build_context }}/Containerfile"
        mode: "0644"
      vars:
        base_image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        service_port: "{{ app_port }}"

    - name: Copy application content into build context
      ansible.builtin.copy:
        content: |
          <html>
          <head><title>Parasol Finance - Secure App</title></head>
          <body>
            <h1>Application Status: Healthy</h1>
            <p>Hardened container built {{ ansible_date_time.iso8601 }}</p>
            <p>Advisory {{ target_advisory | default('RHSA-2024:5138') }} applied.</p>
          </body>
          </html>
        dest: "{{ build_context }}/index.html"
        mode: "0644"

    - name: Copy httpd configuration for container
      ansible.builtin.copy:
        content: |
          ServerRoot "/etc/httpd"
          Listen {{ app_port }}
          ServerTokens Prod
          ServerSignature Off
          TraceEnable Off

          LoadModule mpm_event_module modules/mod_mpm_event.so
          LoadModule unixd_module modules/mod_unixd.so
          LoadModule authz_core_module modules/mod_authz_core.so
          LoadModule dir_module modules/mod_dir.so
          LoadModule mime_module modules/mod_mime.so
          LoadModule log_config_module modules/mod_log_config.so
          LoadModule headers_module modules/mod_headers.so

          TypesConfig /etc/mime.types
          DocumentRoot "/var/www/html"
          DirectoryIndex index.html

          <Directory "/var/www/html">
              Require all granted
          </Directory>

          Header always set X-Content-Type-Options "nosniff"
          Header always set X-Frame-Options "DENY"
          Header always set Content-Security-Policy "default-src 'self'"

          ErrorLog /dev/stderr
          CustomLog /dev/stdout combined
        dest: "{{ build_context }}/httpd.conf"
        mode: "0644"

    - name: Ensure podman is installed
      ansible.builtin.dnf:
        name: podman
        state: present

    - name: Build container image with Podman
      ansible.builtin.command:
        cmd: >-
          podman build
          --cgroup-manager=cgroupfs
          --format oci
          --tag {{ registry_url }}/{{ container_name }}:{{ container_tag }}
          --file Containerfile
          {{ build_context }}
      register: _build_result
      changed_when: true

    - name: Tag image as latest
      ansible.builtin.command:
        cmd: >-
          podman tag
          {{ registry_url }}/{{ container_name }}:{{ container_tag }}
          {{ registry_url }}/{{ container_name }}:latest
      changed_when: true

    - name: Report build result
      ansible.builtin.debug:
        msg: |
          Container build complete:
            Image: {{ registry_url }}/{{ container_name }}:{{ container_tag }}
