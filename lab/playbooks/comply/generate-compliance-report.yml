---
- name: Generate compliance evidence report with before/after comparison
  hosts: appservers
  gather_facts: true

  vars:
    report_output_dir: /tmp/compliance-reports
    _target_cve: "{{ target_cve | default('CVE-2024-38476') }}"
    _target_advisory: "{{ target_advisory | default('RHSA-2024:5138') }}"
    organization: Parasol Finance

  tasks:
    - name: Ensure report directory exists
      ansible.builtin.file:
        path: "{{ report_output_dir }}"
        state: directory
        mode: "0755"

    - name: Read pre-hardening audit results
      ansible.builtin.slurp:
        src: "{{ report_output_dir }}/audit-results-pre.json"
      register: _pre_audit_raw
      failed_when: false

    - name: Read post-hardening audit results
      ansible.builtin.slurp:
        src: "{{ report_output_dir }}/audit-results-post.json"
      register: _post_audit_raw
      failed_when: false

    - name: Parse audit results
      ansible.builtin.set_fact:
        pre_audit: "{{ (_pre_audit_raw.content | b64decode | from_json) if _pre_audit_raw.content is defined else {} }}"
        post_audit: "{{ (_post_audit_raw.content | b64decode | from_json) if _post_audit_raw.content is defined else {} }}"

    - name: Gather current system evidence
      ansible.builtin.command:
        cmd: "{{ item.cmd }}"
      register: _evidence
      changed_when: false
      loop:
        - { name: httpd_version, cmd: "rpm -q httpd" }
        - { name: sestatus, cmd: "sestatus" }
        - { name: firewall, cmd: "firewall-cmd --list-all" }
        - { name: ports, cmd: "ss -tlnp" }
        - { name: sshd, cmd: "sshd -T" }

    - name: Generate HTML compliance report
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/compliance-report-full.html.j2"
        dest: "{{ report_output_dir }}/compliance-report-{{ ansible_date_time.date }}.html"
        mode: "0644"
      vars:
        report_data:
          host: "{{ inventory_hostname }}"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          cve: "{{ _target_cve }}"
          advisory: "{{ _target_advisory }}"
          organization: "{{ organization }}"
          httpd_version: "{{ _evidence.results[0].stdout }}"
          selinux_status: "{{ _evidence.results[1].stdout }}"
          firewall_config: "{{ _evidence.results[2].stdout }}"
          listening_ports: "{{ _evidence.results[3].stdout }}"
          ssh_config: "{{ _evidence.results[4].stdout_lines | select('match', '^(permitrootlogin|x11forwarding|maxauthtries|clientaliveinterval)') | list | join('\n') }}"
          pre_audit: "{{ pre_audit }}"
          post_audit: "{{ post_audit }}"

    - name: Set report filename fact
      ansible.builtin.set_fact:
        _report_filename: "{{ inventory_hostname }}-compliance-{{ ansible_date_time.date }}.html"
        _report_src: "{{ report_output_dir }}/compliance-report-{{ ansible_date_time.date }}.html"

    - name: Push report to central compliance portal
      ansible.builtin.fetch:
        src: "{{ _report_src }}"
        dest: "/tmp/dcc-fetched-reports/{{ _report_filename }}"
        flat: true
      changed_when: false

    - name: Copy report to central portal directory
      ansible.builtin.copy:
        src: "/tmp/dcc-fetched-reports/{{ _report_filename }}"
        dest: "/opt/compliance-reports/{{ _report_filename }}"
        mode: "0644"
      delegate_to: central
      become: true

    - name: Report location
      ansible.builtin.debug:
        msg: >-
          Compliance report generated:
          {{ report_output_dir }}/compliance-report-{{ ansible_date_time.date }}.html
          Portal: {{ compliance_portal_url | default('http://central:8086') }}/{{ _report_filename }}

    - name: Set report stats for workflow
      ansible.builtin.set_stats:
        data:
          report_path: "{{ report_output_dir }}/compliance-report-{{ ansible_date_time.date }}.html"
          pre_audit_passed: "{{ pre_audit.passed | default('N/A') }}"
          post_audit_passed: "{{ post_audit.passed | default('N/A') }}"
          post_audit_compliant: "{{ post_audit.compliant | default(false) }}"

- name: Regenerate compliance portal index
  hosts: central
  gather_facts: true
  become: true

  vars:
    compliance_report_dir: /opt/compliance-reports
    organization: Parasol Finance

  tasks:
    - name: Find all compliance reports
      ansible.builtin.find:
        paths: "{{ compliance_report_dir }}"
        patterns: "*.html"
        excludes: "index.html"
      register: _report_files

    - name: Generate portal index page
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/compliance-portal-index.html.j2"
        dest: "{{ compliance_report_dir }}/index.html"
        mode: "0644"
      vars:
        report_files: "{{ _report_files.files | map(attribute='path') | map('basename') | list }}"
        generated_at: "{{ ansible_date_time.iso8601 }}"
