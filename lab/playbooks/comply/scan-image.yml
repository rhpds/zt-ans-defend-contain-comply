---
- name: Scan container image for vulnerabilities
  hosts: rhel01
  gather_facts: false

  vars:
    container_name: parasol-app
    container_tag: latest
    registry_url: "localhost:5000"
    scan_output_dir: /tmp/container-scan-results
    max_critical_cves: 0
    max_high_cves: 5

  tasks:
    - name: Ensure scan output directory exists
      ansible.builtin.file:
        path: "{{ scan_output_dir }}"
        state: directory
        mode: "0755"

    - name: Inspect container image metadata
      containers.podman.podman_image_info:
        name: "{{ registry_url }}/{{ container_name }}:{{ container_tag }}"
      register: _image_info

    - name: Record image details
      ansible.builtin.copy:
        content: |
          === Container Image Scan Report ===
          Image: {{ registry_url }}/{{ container_name }}:{{ container_tag }}
          Created: {{ _image_info.images[0].Created | default('unknown') }}
          Size: {{ _image_info.images[0].Size | default('unknown') }}
          Layers: {{ _image_info.images[0].RootFS.Layers | default([]) | length }}
          OS: {{ _image_info.images[0].Os | default('linux') }}
          Architecture: {{ _image_info.images[0].Architecture | default('amd64') }}

          Labels:
          {{ _image_info.images[0].Labels | default({}) | to_nice_yaml | indent(2) }}

          Healthcheck: {{ _image_info.images[0].Healthcheck | default('none configured') }}
        dest: "{{ scan_output_dir }}/image-metadata.txt"
        mode: "0644"

    - name: Check image history for suspicious layers
      ansible.builtin.command:
        cmd: "podman history --no-trunc {{ registry_url }}/{{ container_name }}:{{ container_tag }}"
      register: _image_history
      changed_when: false

    - name: Save image history
      ansible.builtin.copy:
        content: "{{ _image_history.stdout }}"
        dest: "{{ scan_output_dir }}/image-history.txt"
        mode: "0644"

    - name: Verify image runs without root
      ansible.builtin.command:
        cmd: >-
          podman inspect --format
          '{{ '{{' }}.Config.User{{ '}}' }}'
          {{ registry_url }}/{{ container_name }}:{{ container_tag }}
      register: _image_user
      changed_when: false

    - name: Assert container does not run as root
      ansible.builtin.assert:
        that:
          - _image_user.stdout | trim | length > 0
          - _image_user.stdout | trim != "root"
          - _image_user.stdout | trim != "0"
        fail_msg: "SECURITY: Container runs as root. Must use non-root user."
        success_msg: "Container user: {{ _image_user.stdout | trim }} (non-root)."

    - name: Check for known vulnerable packages in image
      ansible.builtin.command:
        cmd: >-
          podman --cgroup-manager=cgroupfs run --rm --entrypoint=""
          {{ registry_url }}/{{ container_name }}:{{ container_tag }}
          rpm -qa --qf '%{NAME}-%{VERSION}-%{RELEASE}\n'
      register: _image_packages
      changed_when: false

    - name: Write package list for audit
      ansible.builtin.copy:
        content: "{{ _image_packages.stdout }}"
        dest: "{{ scan_output_dir }}/image-packages.txt"
        mode: "0644"

    - name: Report scan summary
      ansible.builtin.debug:
        msg: |
          Image scan complete:
            Image: {{ registry_url }}/{{ container_name }}:{{ container_tag }}
            Runs as: {{ _image_user.stdout | trim }}
            Package count: {{ _image_packages.stdout_lines | length }}
            Layers: {{ _image_info.images[0].RootFS.Layers | default([]) | length }}
            Results: {{ scan_output_dir }}/
