---
- name: Deploy central services (Splunk + OPA containers)
  hosts: central
  gather_facts: false
  become: true

  vars_files:
    - vars/workshop.yml

  tasks:
    # ── Podman ─────────────────────────────────────────────────────────
    - name: Ensure Podman is installed
      ansible.builtin.dnf:
        name:
          - podman
          - podman-plugins
        state: present

    # ── Firewall ───────────────────────────────────────────────────────
    - name: Install firewalld
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: Ensure firewalld is running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Open service ports in firewall
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - "8000/tcp"
        - "8088/tcp"
        - "8089/tcp"
        - "9997/tcp"
        - "{{ opa_port }}/tcp"
        - "{{ errata_repo_port }}/tcp"
        - "{{ compliance_portal_port }}/tcp"

    # ── Splunk ─────────────────────────────────────────────────────────
    - name: Create Splunk data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ splunk_data_dir }}/var"
        - "{{ splunk_data_dir }}/etc"

    - name: Deploy Splunk container
      containers.podman.podman_container:
        name: "{{ splunk_container_name }}"
        image: "{{ splunk_image }}"
        hostname: splunk
        privileged: true
        state: started
        ports:
          - "8000:8000"
          - "8088:8088"
          - "8089:8089"
          - "9997:9997"
        volumes:
          - "{{ splunk_data_dir }}/var:/opt/splunk/var"
          - "{{ splunk_data_dir }}/etc:/opt/splunk/etc"
        env:
          SPLUNK_START_ARGS: "--accept-license"
          SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
          SPLUNK_PASSWORD: "{{ splunk_password }}"
          SPLUNK_HEC_TOKEN: "{{ splunk_hec_token }}"
      register: _splunk_container

    - name: Generate systemd unit for Splunk
      containers.podman.podman_generate_systemd:
        name: "{{ splunk_container_name }}"
        dest: /etc/systemd/system
        restart_policy: always
      register: _splunk_systemd

    - name: Reload systemd and enable Splunk service
      ansible.builtin.systemd:
        name: "container-{{ splunk_container_name }}"
        daemon_reload: true
        enabled: true
      when: _splunk_systemd is changed

    # ── OPA ────────────────────────────────────────────────────────────
    - name: Create OPA policy directory
      ansible.builtin.file:
        path: "{{ opa_policy_dir }}"
        state: directory
        mode: "0755"

    - name: Deploy DCC compliance policies
      ansible.builtin.copy:
        src: files/opa-policies/
        dest: "{{ opa_policy_dir }}/"
        mode: "0644"
      register: _opa_policies

    - name: Deploy OPA container
      containers.podman.podman_container:
        name: "{{ opa_container_name }}"
        image: "{{ opa_image }}"
        state: started
        ports:
          - "{{ opa_port }}:{{ opa_port }}"
        volumes:
          - "{{ opa_policy_dir }}:/policies:z"
        command: "run --server --addr=0.0.0.0:{{ opa_port }} /policies"
      register: _opa_container

    - name: Restart OPA if policies changed
      containers.podman.podman_container:
        name: "{{ opa_container_name }}"
        state: started
        force_restart: true
      when: _opa_policies is changed and not _opa_container is changed

    - name: Generate systemd unit for OPA
      containers.podman.podman_generate_systemd:
        name: "{{ opa_container_name }}"
        dest: /etc/systemd/system
        restart_policy: always
      register: _opa_systemd

    - name: Reload systemd and enable OPA service
      ansible.builtin.systemd:
        name: "container-{{ opa_container_name }}"
        daemon_reload: true
        enabled: true
      when: _opa_systemd is changed

    # ── Compliance Report Portal ──────────────────────────────────────────
    - name: Create compliance report directory
      ansible.builtin.file:
        path: "{{ compliance_report_dir }}"
        state: directory
        mode: "0755"

    - name: Create placeholder index page
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html><head><title>DCC Compliance Reports</title></head>
          <body><h1>No reports yet</h1><p>Run a compliance report playbook to populate this portal.</p></body></html>
        dest: "{{ compliance_report_dir }}/index.html"
        mode: "0644"
        force: false

    - name: Create systemd service for compliance report portal
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=DCC Compliance Report Portal HTTP Server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/python3 -m http.server {{ compliance_portal_port }} --directory {{ compliance_report_dir }}
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/{{ compliance_portal_service_name }}.service
        mode: "0644"
      register: _portal_unit

    - name: Reload systemd daemon for portal
      ansible.builtin.systemd:
        daemon_reload: true
      when: _portal_unit is changed

    - name: Start and enable compliance report portal
      ansible.builtin.systemd:
        name: "{{ compliance_portal_service_name }}"
        state: started
        enabled: true

    # ── Splunk EDA Add-on ────────────────────────────────────────────────
    - name: Create temporary directory for Splunk apps
      ansible.builtin.tempfile:
        state: directory
        suffix: splunk_apps
      register: _temp_apps_dir

    - name: Download Red Hat EDA Add-on for Splunk
      ansible.builtin.get_url:
        url: "https://my-splunk-apps.s3.us-east-1.amazonaws.com/apps/red-hat-event-driven-ansible-add-on-for-splunk_101.tgz"
        dest: "{{ _temp_apps_dir.path }}/red-hat-event-driven-ansible-add-on-for-splunk_101.tgz"
        mode: "0644"
      register: _eda_addon_download
      retries: 3
      delay: 10
      until: _eda_addon_download is succeeded

    - name: Copy EDA add-on into Splunk container
      containers.podman.podman_container_copy:
        container: "{{ splunk_container_name }}"
        src: "{{ _temp_apps_dir.path }}/red-hat-event-driven-ansible-add-on-for-splunk_101.tgz"
        dest: "/tmp/red-hat-event-driven-ansible-add-on-for-splunk_101.tgz"

    - name: Extract EDA add-on inside Splunk container
      containers.podman.podman_container_exec:
        name: "{{ splunk_container_name }}"
        command: "tar -xzf /tmp/red-hat-event-driven-ansible-add-on-for-splunk_101.tgz -C /opt/splunk/etc/apps"
        user: root

    - name: Clean up add-on tarball from container
      containers.podman.podman_container_exec:
        name: "{{ splunk_container_name }}"
        command: "rm -f /tmp/red-hat-event-driven-ansible-add-on-for-splunk_101.tgz"
        user: root
      failed_when: false

    - name: Clean up temporary directory
      ansible.builtin.file:
        path: "{{ _temp_apps_dir.path }}"
        state: absent

    - name: Restart Splunk container to load EDA add-on
      containers.podman.podman_container:
        name: "{{ splunk_container_name }}"
        state: started
        force_restart: true

    # ── Splunk HEC Configuration ─────────────────────────────────────
    - name: Wait for Splunk API before HEC setup
      ansible.builtin.uri:
        url: "https://localhost:{{ splunk_port }}/services/server/health/splunkd"
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        validate_certs: false
        force_basic_auth: true
        status_code: [200]
      retries: 60
      delay: 10
      register: _splunk_pre_health
      until: _splunk_pre_health is succeeded

    - name: Enable HEC global endpoint
      ansible.builtin.uri:
        url: "https://localhost:{{ splunk_port }}/servicesNS/nobody/splunk_httpinput/data/inputs/http/http"
        method: POST
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        validate_certs: false
        force_basic_auth: true
        body_format: form-urlencoded
        body:
          disabled: "0"
        status_code: [200]

    - name: Remove default HEC token (routes to wrong index)
      ansible.builtin.uri:
        url: "https://localhost:{{ splunk_port }}/servicesNS/nobody/splunk_httpinput/data/inputs/http/http%3A%252F%252Fsplunk_hec_token"
        method: DELETE
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        validate_certs: false
        force_basic_auth: true
        status_code: [200, 404]

    - name: Create DCC workshop HEC token
      ansible.builtin.uri:
        url: "https://localhost:{{ splunk_port }}/servicesNS/nobody/splunk_httpinput/data/inputs/http"
        method: POST
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        validate_certs: false
        force_basic_auth: true
        body_format: form-urlencoded
        body:
          name: dcc_workshop
          token: "{{ splunk_hec_token }}"
          index: main
          sourcetype: linux_secure
        status_code: [201, 409]

    # ── Health Checks ──────────────────────────────────────────────────
    - name: Wait for Splunk to be healthy
      ansible.builtin.uri:
        url: "https://localhost:{{ splunk_port }}/services/server/health/splunkd"
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        validate_certs: false
        force_basic_auth: true
        status_code: [200]
      retries: 60
      delay: 10
      register: _splunk_health
      until: _splunk_health is succeeded

    - name: Wait for OPA to be healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ opa_port }}/health"
        status_code: [200]
      retries: 15
      delay: 5
      register: _opa_health
      until: _opa_health is succeeded

    - name: Report central services status
      ansible.builtin.debug:
        msg: |
          Central services deployed:
            Splunk:     http://{{ inventory_hostname }}:8000  (admin/{{ splunk_password }})
            OPA:        http://{{ inventory_hostname }}:{{ opa_port }}
            Reports:    http://{{ inventory_hostname }}:{{ compliance_portal_port }}
            Errata:     (pending -- deployed by configure-errata-repo.yml)
